""" DateTime scalar """
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

""" Root query """
type Query {
  me: User @guard @auth
  teachers(name: String @where(operator: "like"), email: String @where(operator: "like")): [Teacher!]! @paginate(defaultCount: 10) @orderBy(column: "id", direction: DESC)
  courses(name: String @where(operator: "like"), level: String @where(operator: "like"), year: Int @where): [Course!]! @paginate(defaultCount: 10) @orderBy(column: "id", direction: DESC)
  students(name: String @where(operator: "like"), email: String @where(operator: "like"), code: String @where(operator: "like")): [Student!]! @paginate(defaultCount: 10) @orderBy(column: "id", direction: DESC)
  schedules(course_id: ID @where, teacher_id: ID @where, day_of_week: Int @where, description: String @where, group_id: String @where): [Schedule!]! @paginate(defaultCount: 20)
  studentAvailabilities(student_id: ID, day_of_week: Int): [StudentAvailability!]! @paginate(defaultCount: 50, builder: "App\\GraphQL\\Queries\\StudentAvailabilities")
  studentAvailability(id: ID! @eq): StudentAvailability @find
}

""" Root mutation """
type Mutation {
    createTeacher(input: CreateTeacherInput! @spread): Teacher @guard @create
    updateTeacher(id: ID!, input: UpdateTeacherInput! @spread): Teacher @guard @update
    deleteTeacher(id: ID! @eq(key: "id")): Teacher @guard @delete(globalId: true)

    createCourse(input: CreateCourseInput! @spread): Course @guard @create
    updateCourse(id: ID!, input: UpdateCourseInput! @spread): Course @guard @update
    deleteCourse(id: ID! @eq(key: "id")): Course @guard @delete(globalId: true)

    createStudent(input: CreateStudentInput! @spread): Student @guard @create
    updateStudent(id: ID!, input: UpdateStudentInput! @spread): Student @guard @update
    deleteStudent(id: ID! @eq(key: "id")): Student @guard @delete(globalId: true)

    createSchedule(input: CreateScheduleInput!): Schedule @guard
      @field(resolver: "App\\GraphQL\\Mutations\\CreateSchedule@__invoke")
    updateSchedule(id: ID!, input: UpdateScheduleInput!): Schedule @guard
      @field(resolver: "App\\GraphQL\\Mutations\\UpdateSchedule@__invoke")
    deleteSchedule(id: ID! @eq(key: "id")): Schedule @guard @delete(globalId: true)

    createStudentAvailability(input: CreateStudentAvailabilityInput! @spread): StudentAvailability @guard
      @field(resolver: "App\\GraphQL\\Mutations\\CreateStudentAvailability@__invoke")
    updateStudentAvailability(id: ID!, input: UpdateStudentAvailabilityInput! @spread): StudentAvailability @guard
      @field(resolver: "App\\GraphQL\\Mutations\\UpdateStudentAvailability@__invoke")
    deleteStudentAvailability(id: ID! @eq(key: "id")): StudentAvailability @guard @delete(globalId: true)
    bulkCreateStudentAvailabilities(input: BulkCreateStudentAvailabilitiesInput! @spread): [StudentAvailability!]! @guard
      @field(resolver: "App\\GraphQL\\Mutations\\BulkCreateStudentAvailabilities@__invoke")
    bulkUpdateStudentAvailabilities(input: BulkUpdateStudentAvailabilitiesInput! @spread): [StudentAvailability!]! @guard
      @field(resolver: "App\\GraphQL\\Mutations\\BulkUpdateStudentAvailabilities@__invoke")

    bulkCreateSchedules(input: BulkCreateSchedulesInput! @spread): [Schedule!]! @guard
      @field(resolver: "App\\GraphQL\\Mutations\\BulkCreateSchedules@__invoke")
    bulkUpdateSchedules(input: BulkUpdateSchedulesInput! @spread): [Schedule!]! @guard
      @field(resolver: "App\\GraphQL\\Mutations\\BulkUpdateSchedules@__invoke")
}

""" Eloquent models """
type User {
  id: ID!
  name: String!
  email: String!
}

type Teacher @model(class: "App\\Models\\Teacher") {
  id: ID!
  name: String!
  email: String!
  courses: [Course!]! @belongsToMany(relation: "courses")
  schedules: [Schedule!]! @hasMany
  created_at: DateTime!
  updated_at: DateTime!
}

type Course @model(class: "App\\Models\\Course") {
  id: ID!
  name: String!
  level: String
  year: Int
  teachers: [Teacher!]! @belongsToMany(relation: "teachers")
  schedules: [Schedule!]! @hasMany
  created_at: DateTime!
  updated_at: DateTime!
}

type Student @model(class: "App\\Models\\Student") {
  id: ID!
  name: String!
  email: String!
  code: String!
  availabilities: [StudentAvailability!]! @hasMany
  created_at: DateTime!
  updated_at: DateTime!
}

type StudentAvailability @model(class: "App\\Models\\StudentAvailability") {
  id: ID!
  student_id: ID!
  student: Student! @belongsTo
  day_of_week: Int!
  start_time: String!
  end_time: String!
  created_at: DateTime!
  updated_at: DateTime!
}

type Schedule @model(class: "App\\Models\\Schedule") {
  id: ID!
  course: Course! @belongsTo
  course_id: ID!
  teacher: Teacher! @belongsTo
  teacher_id: ID!
  day_of_week: Int!
  starts_at: String!
  ends_at: String!
  description: String!
  group_id: String
  created_at: DateTime!
  updated_at: DateTime!
}

""" Inputs """
input CreateTeacherInput {
  name: String!
  email: String!
}

input UpdateTeacherInput {
  name: String
  email: String
}

input CreateCourseInput {
  name: String!
  level: String
  year: Int
}

input UpdateCourseInput {
  name: String
  level: String
  year: Int
}

input CreateStudentInput {
  name: String!
  email: String!
  code: String!
}

input UpdateStudentInput {
  name: String
  email: String
  code: String
}

input CreateScheduleInput {
  course_id: ID! @rules(apply: ["required", "exists:courses,id"])
  teacher_id: ID! @rules(apply: ["required", "exists:teachers,id"])
  day_of_week: Int! @rules(apply: ["required", "integer", "min:0", "max:6"])
  starts_at: String! @rules(apply: ["required", "date_format:H:i"])
  ends_at: String! @rules(apply: ["required", "date_format:H:i"])
  description: String!
}

input UpdateScheduleInput {
  course_id: ID @rules(apply: ["exists:courses,id"])
  teacher_id: ID @rules(apply: ["exists:teachers,id"])
  day_of_week: Int @rules(apply: ["integer", "min:0", "max:6"])
  starts_at: String @rules(apply: ["date_format:H:i"])
  ends_at: String @rules(apply: ["date_format:H:i"])
  description: String
  group_id: String
}

input CreateStudentAvailabilityInput {
  student_id: ID! @rules(apply: ["required", "exists:students,id"])
  day_of_week: Int! @rules(apply: ["required", "integer", "min:0", "max:6"])
  start_time: String! @rules(apply: ["required", "date_format:H:i", "before:end_time"])
  end_time: String! @rules(apply: ["required", "date_format:H:i", "after:start_time"])
}

input UpdateStudentAvailabilityInput {
  student_id: ID @rules(apply: ["exists:students,id"])
  day_of_week: Int @rules(apply: ["integer", "min:0", "max:6"])
  start_time: String @rules(apply: ["date_format:H:i"])
  end_time: String @rules(apply: ["date_format:H:i"])
}

input StudentAvailabilitySlotInput {
  day_of_week: Int! @rules(apply: ["required", "integer", "min:0", "max:6"])
  start_time: String! @rules(apply: ["required", "date_format:H:i"])
  end_time: String! @rules(apply: ["required", "date_format:H:i"])
}

input BulkCreateStudentAvailabilitiesInput {
  student_id: ID! @rules(apply: ["required", "exists:students,id"])
  availabilities: [StudentAvailabilitySlotInput!]! @rules(apply: ["required", "array", "min:1"])
}

input BulkUpdateStudentAvailabilitiesInput {
  student_id: ID! @rules(apply: ["required", "exists:students,id"])
  availabilities: [StudentAvailabilitySlotInput!]! @rules(apply: ["required", "array", "min:1"])
}

input ScheduleSlotInput {
  teacher_id: ID! @rules(apply: ["required", "exists:teachers,id"])
  day_of_week: Int! @rules(apply: ["required", "integer", "min:0", "max:6"])
  starts_at: String! @rules(apply: ["required", "date_format:H:i"])
  ends_at: String! @rules(apply: ["required", "date_format:H:i"])
}

input BulkCreateSchedulesInput {
  course_id: ID! @rules(apply: ["required", "exists:courses,id"])
  description: String!
  schedules: [ScheduleSlotInput!]! @rules(apply: ["required", "array", "min:1"])
}

input BulkUpdateSchedulesInput {
  course_id: ID! @rules(apply: ["required", "exists:courses,id"])
  description: String!
  group_id: String
  schedules: [ScheduleSlotInput!]! @rules(apply: ["required", "array", "min:1"])
}
